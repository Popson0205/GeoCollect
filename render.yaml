# GeoCollect Phase 1 — Render Deployment
# ─────────────────────────────────────────────────────────────────────────────
# Services deployed here:
#   - api          → Render Web Service (Node.js/Fastify)
#   - geo-api      → Render Web Service (Python/FastAPI)
#   - studio       → Render Web Service (Next.js)
#   - field        → Render Static Site (React PWA)
#   - postgres     → Render Managed PostgreSQL (with PostGIS)
#   - redis        → Render Managed Redis
#
# GeoServer + MinIO: Deploy separately via Docker on a Render Private Service
# or use a VPS. See README for instructions.
# ─────────────────────────────────────────────────────────────────────────────

databases:
  - name: geocollect-postgres
    databaseName: geocollect
    user: geocollect
    plan: starter  # upgrade to standard for production
    postgresMajorVersion: "16"

services:
  # ─── Redis ─────────────────────────────────────────────────────────────
  - type: redis
    name: geocollect-redis
    plan: starter
    maxmemoryPolicy: noeviction

  # ─── Fastify API ────────────────────────────────────────────────────────
  - type: web
    name: geocollect-api
    runtime: node
    plan: starter
    rootDir: api
    buildCommand: npm ci
    startCommand: node src/db/migrate.js && node src/index.js
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: geocollect-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: geocollect-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: MINIO_ENDPOINT
        value: ""  # Set to your MinIO host
      - key: MINIO_ACCESS_KEY
        value: ""  # Set your MinIO credentials
      - key: MINIO_SECRET_KEY
        value: ""

  # ─── Geo API ────────────────────────────────────────────────────────────
  - type: web
    name: geocollect-geo-api
    runtime: python
    plan: starter
    rootDir: geo-api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: geocollect-postgres
          property: connectionString
      - key: GEOSERVER_URL
        value: ""  # Set to your GeoServer URL
      - key: GEOSERVER_USER
        value: admin
      - key: GEOSERVER_PASS
        value: ""

  # ─── Studio ─────────────────────────────────────────────────────────────
  - type: web
    name: geocollect-studio
    runtime: node
    plan: starter
    rootDir: studio
    buildCommand: npm ci && npm run build
    startCommand: node .next/standalone/server.js
    healthCheckPath: /
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: geocollect-api
          property: host
          envVarKey: NEXT_PUBLIC_API_URL
      - key: NEXT_PUBLIC_GEO_API_URL
        fromService:
          type: web
          name: geocollect-geo-api
          property: host
          envVarKey: NEXT_PUBLIC_GEO_API_URL

  # ─── Field (Static PWA) ─────────────────────────────────────────────────
  - type: web
    name: geocollect-field
    runtime: node
    plan: starter
    rootDir: field
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: geocollect-api
          property: host
          envVarKey: VITE_API_URL
