databases:
  - name: geocollect-postgres
    databaseName: geocollect
    user: geocollect
    plan: starter
    postgresMajorVersion: "16"

services:

  - type: redis
    name: geocollect-redis
    plan: starter
    maxmemoryPolicy: noeviction

  - type: web
    name: geocollect-api
    runtime: node
    plan: starter
    rootDir: api
    buildCommand: npm ci
    startCommand: npm run migrate && npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: geocollect-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: geocollect-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: MINIO_ENDPOINT
        value: ""
      - key: MINIO_ACCESS_KEY
        value: ""
      - key: MINIO_SECRET_KEY
        value: ""

  - type: web
    name: geocollect-geo-api
    runtime: python
    plan: starter
    rootDir: geo-api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: geocollect-postgres
          property: connectionString
      - key: GEOSERVER_URL
        value: ""
      - key: GEOSERVER_USER
        value: admin
      - key: GEOSERVER_PASS
        value: ""

  - type: web
    name: geocollect-studio
    runtime: node
    plan: starter
    rootDir: studio
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: NEXT_PUBLIC_API_URL
        value: "https://geocollect-api.onrender.com"
      - key: NEXT_PUBLIC_GEO_API_URL
        value: "https://geocollect-geo-api.onrender.com"

  - type: web
    name: geocollect-field
    runtime: node
    plan: starter
    rootDir: field
    buildCommand: npm ci && npm run build
    startCommand: npx serve -s dist -l $PORT
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: "https://geocollect-api.onrender.com"
      - key: VITE_GEO_API_URL
        value: "https://geocollect-geo-api.onrender.com"
