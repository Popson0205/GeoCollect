# GeoCollect Phase 1 — Render Deployment
# ─────────────────────────────────────────────────────────────────────────────
# Services deployed here:
#   api       → Render Web Service   (Node.js / Fastify)
#   geo-api   → Render Web Service   (Python / FastAPI)
#   studio    → Render Web Service   (Next.js)
#   field     → Render Static Site   (React PWA / Vite)
#   postgres  → Render Managed PostgreSQL (with PostGIS)
#   redis     → Render Managed Redis
#
# GeoServer + MinIO: Deploy separately on a VPS or Render Private Service.
# ─────────────────────────────────────────────────────────────────────────────

databases:
  - name: geocollect-postgres
    databaseName: geocollect
    user: geocollect
    plan: starter                  # upgrade to standard for production
    postgresMajorVersion: "16"

services:

  # ─── Redis ─────────────────────────────────────────────────────────────────
  - type: redis
    name: geocollect-redis
    plan: starter
    maxmemoryPolicy: noeviction

  # ─── Fastify API ───────────────────────────────────────────────────────────
  # FIX: startCommand now uses npm scripts instead of bare `node src/...`
  # paths, which caused Render to resolve src/src (double-src) at checkout.
  - type: web
    name: geocollect-api
    runtime: node
    plan: starter
    rootDir: api
    buildCommand: npm ci
    startCommand: npm run migrate && npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: geocollect-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: geocollect-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: MINIO_ENDPOINT
        value: ""          # Set to your MinIO host
      - key: MINIO_ACCESS_KEY
        value: ""          # Set your MinIO access key
      - key: MINIO_SECRET_KEY
        value: ""          # Set your MinIO secret key

  # ─── Geo API (FastAPI / Python) ────────────────────────────────────────────
  - type: web
    name: geocollect-geo-api
    runtime: python
    plan: starter
    rootDir: geo-api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: geocollect-postgres
          property: connectionString
      - key: GEOSERVER_URL
        value: ""          # Set to your GeoServer URL
      - key: GEOSERVER_USER
        value: admin
      - key: GEOSERVER_PASS
        value: ""          # Set your GeoServer password

  # ─── Studio (Next.js) ──────────────────────────────────────────────────────
  # FIX: startCommand uses `npm start` (next start) instead of
  # `node .next/standalone/server.js`, which requires output:'standalone'
  # in next.config.js. npm start works out of the box.
  - type: web
    name: geocollect-studio
    runtime: node
    plan: starter
    rootDir: studio
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: geocollect-api
          property: host
      - key: NEXT_PUBLIC_GEO_API_URL
        fromService:
          type: web
          name: geocollect-geo-api
          property: host

  # ─── Field App (React PWA / Vite → Static Site) ────────────────────────────
  # FIX: Vite outputs to `dist/`, not `build/`. Deployed as a static site,
  # not a web service — no Node runtime needed at runtime.
  - type: static
    name: geocollect-field
    rootDir: field
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html    # SPA fallback for React Router
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: geocollect-api
          property: host
      - key: VITE_GEO_API_URL
        fromService:
          type: web
          name: geocollect-geo-api
          property: host
